name: audio_notes
description: Offline speech-to-text todo application using Vosk ASR
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  flutter_riverpod: ^3.3.1
  riverpod_annotation: ^4.0.2
  
  # Database
  sqflite: ^2.3.0
  path_provider: ^2.1.1
  path: ^1.8.3
  
  # UUID generation
  uuid: ^4.2.2
  
  # Audio handling
  permission_handler: ^12.0.1
  audioplayers: ^6.0.0

  # Date formatting
  intl: ^0.20.2
  
  # JSON serialization
  json_annotation: ^4.8.1
  
  # HTTP client for downloading models
  http: ^1.1.0
  
  # Archive extraction for ZIP files
  archive: ^3.4.9

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.7
  riverpod_generator: ^4.0.3
  json_serializable: ^6.7.1

flutter:
  uses-material-design: true
  
